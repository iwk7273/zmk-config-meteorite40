# Optional features (uncomment if used)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_ZMK_DISPLAY=y

# General ZMK settings
# CONFIG_SETTINGS=y

CONFIG_ZMK_KEYBOARD_NAME="meteorite40"

# NFC ピンを GPIO として使う
CONFIG_NFCT_PINS_AS_GPIOS=y

# ZMK Studio サポート
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=128
CONFIG_ZMK_STUDIO_RPC_TX_BUF_SIZE=128
CONFIG_ZMK_COMBO_SETTINGS_MAX_COMBOS=16
CONFIG_ZMK_COMBO_SETTINGS_MAX_KEYS_PER_COMBO=4

# EC11 ロータリーエンコーダーサポート
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# PMW3610
CONFIG_PMW3610_CUSTOM=y
CONFIG_PMW3610_CUSTOM_SWAP_XY=y
CONFIG_PMW3610_CUSTOM_INVERT_X=y
CONFIG_PMW3610_CUSTOM_INVERT_Y=y
CONFIG_PMW3610_CUSTOM_REPORT_INTERVAL_MIN=10

# PMW3610 power-up reset extra delay (ms)
# CONFIG_PMW3610_CUSTOM_INIT_POWER_UP_EXTRA_DELAY_MS=100
CONFIG_PMW3610_CUSTOM_INIT_RETRY_COUNT=3
CONFIG_PMW3610_CUSTOM_INIT_RETRY_DELAY_MS=200


# トラックボールカスタムモジュール
CONFIG_ZMK_METEORITE_INPUT_PROCESSOR_SENSOR_ROTATION=y
CONFIG_ZMK_METEORITE_INPUT_PROCESSOR_XY_CLIPPER=y

# 入力スケーリングモジュール
CONFIG_ZMK_METEORITE_INPUT_PROCESSOR_MOTION_SCALER=y
CONFIG_ZMK_METEORITE_INPUT_PROCESSOR_SCROLL_LAYER=y

# Bluetooth
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Prospector Scanner status advertisement
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="meteorite40"
CONFIG_PROSPECTOR_CHANNEL=0

# Phase 2: v2 status advertising (multi-frame legacy ADV redesign).
# Splices three rotating 26-byte v2 frames into the existing v1 adv
# work cycle (service UUID 0xABCE vs v1 0xABCD). No BT_EXT_ADV needed —
# v2 reuses the v1 transport so it cannot break the v1 piggyback path.
CONFIG_PROSPECTOR_STATUS_ADV_V2_EXT=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# PPCP: CI 7.5–11.25 ms
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6    
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9  

# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
# CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

#CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=1

# バッテリー情報の報告
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=600
CONFIG_BT_BAS=y

# 省電力設定
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=120000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_PM=y
CONFIG_PM_DEVICE=y

# カスタムコンフィグ
CONFIG_ZMK_CUSTOM_CONFIG=y

# 設定のリセット
# CONFIG_ZMK_SETTINGS_RESET_ON_START=y

# Debug
# CONFIG_PMW3610_LOG_LEVEL_DBG=y
# CONFIG_ZMK_USB_LOGGING=y
# CONFIG_LOG_DEFAULT_LEVEL=4
# CONFIG_LOG_BUFFER_SIZE=8192
